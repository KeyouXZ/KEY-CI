name: Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # Menjalankan job di dalam container Alpine
    container:
      image: alpine:latest
      options: --user root

    steps:
      - name: Install system dependencies
        run: |
          apk update
          # Menambahkan dependensi yang dibutuhkan untuk kompilasi statik (musl)
          apk add --no-cache \
            build-base \
            openssl-dev \
            openssl-libs-static \
            opus-dev \
            pkgconfig \
            cmake \
            clang \
            nasm \
            rust \
            cargo \
            git \
            rustup

          rustup target add x86_64-unknown-linux-musl

      - name: Checkout KORD
        uses: actions/checkout@v4
        with:
          repository: KeyouXZ/KORD
          token: ${{ secrets.GH_TOKEN }}
          path: KORD

      - name: Build
        working-directory: KORD
        env:
          # Menggunakan target musl untuk hasil statik penuh
          # Alpine menggunakan musl secara default
          OPENSSL_STATIC: 1
          # Membantu linker mencari library statik di Alpine
          LIBRARY_PATH: /usr/lib
        run: |
          cargo build --profile max --target x86_64-unknown-linux-musl

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: kord-linux-binary
          # Sesuaikan path output sesuai target musl
          path: KORD/target/x86_64-unknown-linux-musl/max/kord
