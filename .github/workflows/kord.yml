name: Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config cmake clang nasm

      - name: Checkout KORD
        uses: actions/checkout@v4
        with:
          repository: KeyouXZ/KORD
          token: ${{ secrets.GH_TOKEN }}
          path: KORD

      - name: Build
        working-directory: KORD
        run: |
          # Replaced cargo zigbuild with standard cargo build
          cargo build --profile max 

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: kord-linux-binary
          path: KORD/target/release/kord
